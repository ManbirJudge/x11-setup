backend = "glx";
vsync = true;

shadow = false;
shadow-radius = 15;
shadow-opacity = 0.35;
shadow-offset-x = -8;
shadow-offset-y = -8;

fading = false;

corner-radius = 0;
rounded-corners-exclude = [
  "window_type = 'dock'"
]

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
    "90:class_g = 'XTerm'",
    "85:class_g = 'Rofi'"
];

blur:
{
    method = "dual_kawase";
    strength = 4;
}
blur-background = false
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "window_type = 'popup_menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'tooltip'",
    "window_type = 'utility'",
    "window_type = 'menu'"
];
